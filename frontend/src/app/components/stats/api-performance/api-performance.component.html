<div class="app-background min-h-screen px-6 py-12 space-y-10 flex flex-col items-center">
    <!-- Header Section -->
	<section class="w-full max-w-7xl flex justify-between items-start p-8 rounded-[2rem] border backdrop-blur-sm transition-colors bg-gray-50 border-gray-200 dark:bg-gray-900/20 dark:border-white/5">
		<div class="mt-2.5">
			<app-back-to-dashboard-button (backToStatsDashboard)="goBackToDashboard()"></app-back-to-dashboard-button>
		</div>

		<div class="flex flex-col items-center">
			<h1 class="app-page-titles !mb-4">API Analytics</h1>
			<div class="flex p-1 rounded-xl shadow-inner border transition-colors
						bg-white border-gray-200
						dark:bg-black/40 dark:border-white/10">
				@for (range of ['1h', '1d', '1w', '1m']; track range) {
					<button
						(click)="onDateRangeChange(range)"
						[class.bg-indigo-600]="selectedDateRange === range"
						[class.text-white]="selectedDateRange === range"
						[class.shadow-lg]="selectedDateRange === range"
						[class.scale-105]="selectedDateRange === range"
						[class.text-gray-600]="selectedDateRange !== range"
						[class.dark:text-gray-400]="selectedDateRange !== range"
						class="px-5 py-1.5 cursor-pointer rounded-lg text-xs font-black transition-all duration-300 uppercase tracking-widest hover:text-indigo-600 dark:hover:text-white">
						{{ range }}
					</button>
				}
			</div>
		</div>

		<div class="flex items-center gap-4 mt-1.5">
			<mat-checkbox
				class="download-checkbox"
				[checked]="allChartsSelected"
				(change)="toggleSelectedCharts()">
				<span class="text-[10px] font-black uppercase tracking-widest text-gray-700 dark:text-gray-400">
					Select All
				</span>
			</mat-checkbox>
			<app-donwload-button (downloadFunc)="downloadChartAsPNG()"></app-donwload-button>
		</div>
	</section>

	<!-- Cards Section -->
	<section class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 animate-fadeIn">
		<app-analytics-cards [data]="analyticsCardsContent"></app-analytics-cards>
	</section>

	<!-- Charts Section -->
	<section class="w-full max-w-7xl mx-auto py-12 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
		<!-- Health Rate Chart -->
		<div class="lg:col-span-1 bg-white dark:bg-gray-800/60 p-8 rounded-[2.5rem] border border-white/10 shadow-xl flex flex-col">
			<div class="flex justify-between items-center mb-6">
				<h2 class="text-2xl font-black tracking-tighter text-emerald-500 flex items-center gap-2">
					<mat-icon>security</mat-icon> Health Ratio
				</h2>
				<mat-checkbox
					[(ngModel)]="selectedChartsToDownload.errorChart"
					(change)="updateAllSelectedState()"
					class="download-checkbox">
					<span class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Include in Export</span>
				</mat-checkbox>
			</div>

			<div class="relative flex-grow h-[300px]">
				<canvas
					#errorChart="base-chart"
					baseChart
					[data]="errorsChartData"
					[options]="pieOptions"
					type="pie">
				</canvas>
			</div>
		</div>

		<!-- Performance Chart -->
		<div class="lg:col-span-2 bg-white dark:bg-gray-800/60 p-8 rounded-[2.5rem] border border-white/10 shadow-xl">
			<div class="flex justify-between items-center mb-6">
				<h2 class="text-2xl font-black tracking-tighter text-indigo-500 flex items-center gap-2">
					<mat-icon>timeline</mat-icon> Performance History
				</h2>
				<mat-checkbox
					[(ngModel)]="selectedChartsToDownload.perfChart"
					(change)="updateAllSelectedState()"
					class="download-checkbox">
					<span class="text-[9px] font-bold tracking-widest text-gray-500">Include in Export</span>
				</mat-checkbox>
			</div>
			<div class="relative h-[350px]">
				<canvas
					#perfChart="base-chart"
					baseChart
					[data]="performanceChartData"
					[options]="lineOptions"
					type="line">
				</canvas>
			</div>
		</div>

		<!-- Endpoints Chart -->
		<div class="lg:col-span-3 bg-white dark:bg-gray-800/60 p-8 rounded-[2.5rem] border border-white/10 shadow-xl">
			<div class="flex justify-between items-center mb-8">
				<h2 class="text-2xl font-black tracking-tighter text-purple-500 flex items-center gap-2">
					<mat-icon>hub</mat-icon> Endpoint Traffic Usage
				</h2>
				<div class="flex items-center gap-6">
					<span class="bg-purple-500/10 text-purple-500 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-purple-500/20">
						Top 5 Most Demanded Endpoints
					</span>
					<mat-checkbox
						[(ngModel)]="selectedChartsToDownload.endpointChart"
						(change)="updateAllSelectedState()"
						class="download-checkbox">
						<span class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Include in Export</span>
					</mat-checkbox>
				</div>
			</div>
			<div class="relative h-[400px]">
				<canvas
					#endpointChart="base-chart"
					baseChart
					[data]="endpointsChartData"
					[options]="barOptions"
					type="bar">
				</canvas>
			</div>
		</div>
	</section>

    @if (loading) {
        <app-loading-modal message="Loading Charts..."></app-loading-modal>
    }

    @if (error) {
        <app-error-modal [title]="errorMessage" (cancel)="error = false"></app-error-modal>
    }
</div>
