<div class="app-background min-h-screen text-gray-900 dark:text-white px-6 py-16 space-y-12 flex flex-col items-center">
    <section class="w-full max-w-7xl flex flex-col md:grid md:grid-cols-3 items-center gap-4 md:gap-0">
		<div class="flex justify-start">
			<app-back-to-dashboard-button (backToStatsDashboard)="goBackToDashboard()"></app-back-to-dashboard-button>
		</div>

		<div class="flex justify-center">
			<h1 class="app-page-titles !mb-0 whitespace-nowrap">
				Visibility Analytics
			</h1>
		</div>
		<div class="hidden md:block"></div>
	</section>

	<!-- Cards Section -->
	<section class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 animate-fadeIn">
		<app-analytics-cards [data]="analyticsCardsContent"></app-analytics-cards>
	</section>

	<!-- Date Filter -->
    <section class="w-full max-w-7xl animate-fadeInUpSmooth space-y-6">
        <div class="bg-white/50 dark:bg-gray-800/30 backdrop-blur-md p-4 rounded-[1.5rem] border border-white/20 flex flex-wrap items-center justify-between gap-4">
            <div class="flex flex-wrap items-center gap-4">
				<div class="flex items-center gap-3">
					<div class="relative">
						<mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 scale-75">event</mat-icon>
						<input
							#dateFrom
							type="text"
							placeholder="Start Date"
							class="bg-white dark:bg-gray-900/50 border-none rounded-xl py-2 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none w-40 cursor-pointer shadow-sm"
						>
					</div>

					<div class="text-gray-400 font-black">→</div>

					<div class="relative">
						<mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 scale-75">event</mat-icon>
						<input
							#dateTo
							type="text"
							placeholder="End Date"
							class="bg-white dark:bg-gray-900/50 border-none rounded-xl py-2 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none w-40 cursor-pointer shadow-sm"
						>
					</div>
				</div>

				<!-- Reset Date Filter Button -->
				<button (click)="resetDateFilter()"
					class="flex items-center cursor-pointer gap-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-200 px-5 py-2 rounded-xl text-xs font-black uppercase transition-all active:scale-95">
					<mat-icon class="scale-75">restart_alt</mat-icon>
					Reset Dates
				</button>
            </div>

			<!-- Download PNG Button -->
			<app-donwload-button (downloadFunc)="downloadChartAsPNG()"></app-donwload-button>
        </div>

		<!-- Chart Container -->
        <div class="bg-white dark:bg-gray-800/80 p-10 rounded-[2.5rem] shadow-2xl border border-white/10 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-indigo-500/5 rounded-full blur-3xl"></div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h2 class="text-4xl text-blue-800 dark:text-blue-300 font-black tracking-tight">Visibility Overview</h2>
                    <p class="text-gray-500 dark:text-gray-400 font-medium">Monitoring application visibility and growth rate</p>
                </div>

                <div class="flex gap-2">
                    <span class="flex items-center bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300 px-4 py-2 rounded-xl text-xs font-black uppercase">
						<mat-icon class="scale-75 mr-2">calendar_today</mat-icon>
						<span class="leading-none">{{ getDateRange() }}</span>
					</span>
                </div>
            </div>

            <div class="relative h-[400px] w-full">
                <canvas baseChart
                    [data]="chartData"
                    [options]="chartOptions"
                    [type]="chartType">
                </canvas>
            </div>
        </div>
    </section>

	@if (error) {
		<app-error-modal [title]="errorMessage" (cancel)="error = false"></app-error-modal>
	}

	@if (loading) {
		<app-loading-modal [message]="'Loading Chart...'"></app-loading-modal>
	}
</div>
