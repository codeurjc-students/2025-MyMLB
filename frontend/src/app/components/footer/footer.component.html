<footer class="w-full bg-slate-950 text-gray-400 py-12 px-6 border-t border-white/5">
    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 items-start gap-10 mb-10">

            <div class="flex flex-col items-start md:items-start">
                <div class="flex items-center">
                    <img src="assets/logo.png" class="h-14 rounded-md p-0.5 shadow-md" alt="Diamond Insights Logo"/>
                    <h3 class="text-2xl font-bold tracking-tight bg-gradient-to-br from-blue-500 via-blue-600 to-indigo-600 bg-clip-text text-transparent">
                        Diamond Insights
                    </h3>
                </div>
                <p class="text-sm leading-relaxed mt-2 text-center ml-13">
                    Master the diamond with data.
                </p>
            </div>

            <div class="flex flex-col items-center justify-center space-y-4">
                <span class="text-xs uppercase tracking-[0.2em] font-semibold text-gray-500 text-center">Need help?</span>
                <button (click)="showModal = true" class="group cursor-pointer relative flex items-center gap-3 px-6 py-3 bg-white/5 hover:bg-white/10 text-white text-sm font-medium rounded-full border border-white/10 transition-all duration-300 hover:scale-105 active:scale-95">
                    <mat-icon class="text-white text-[22px] flex items-center justify-center">
                        support_agent
                    </mat-icon>
                    Contact Support
                </button>
            </div>

           <div class="flex flex-col items-center md:items-end text-center md:text-right space-y-2">
				<p class="text-[11px] uppercase tracking-[0.2em] text-gray-500 font-bold mb-1">
					Disclaimer
				</p>

				<p class="text-xs text-gray-500 leading-none">
					Real-time MLB statistics via Stats API
				</p>

				<p class="text-xs text-gray-500 leading-none">
					Developed by
					<span class="text-blue-400/80 font-medium hover:text-blue-400 transition-colors cursor-default">
						Alfonso Rodríguez
					</span>
				</p>

				<p class="text-xs text-gray-400/60 leading-none">
					Not affiliated with MLB
				</p>
			</div>
        </div>
    </div>

    @if (showModal) {
        <app-support [showModal]="showModal" (closeModal)="showModal = false"></app-support>
    }
</footer>
