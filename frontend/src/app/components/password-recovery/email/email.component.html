<form [formGroup]="emailForm" (ngSubmit)="submitEmail()" class="space-y-4">
	<mat-form-field class="w-full">
		<mat-label>Email</mat-label>
		<input matInput
			formControlName="email"
			type="email"
			placeholder="Ex. myEmail@gmail.com">

		@if (getEmail()?.invalid && getEmail()?.touched) {
			<mat-error>Email is required</mat-error>
		}
	</mat-form-field>

	<button type="submit" class="app-button group tracking-widest w-full">
		<span class="app-button-bright"></span>
		<span class="app-button-texts">SEND</span>
	</button>

	@if (errorMessage) {
		<p class="text-red-600 text-sm mt-2">{{ errorMessage }}</p>
	}
</form>
