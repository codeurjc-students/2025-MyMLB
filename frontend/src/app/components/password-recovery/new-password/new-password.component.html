<form [formGroup]="passwordForm" (ngSubmit)="submitPassword()" class="space-y-4">
	<mat-form-field class="w-full">
		<mat-label>New Password</mat-label>
		<input matInput
			formControlName="newPassword"
			type="password"
			placeholder="Ex. myNewPassword">

		@if (getNewPassword()?.invalid && getNewPassword()?.touched) {
			<mat-error>New Password is required</mat-error>
		}
	</mat-form-field>

	<button type="submit" class="app-button group tracking-widest w-full">
		<span class="app-button-bright"></span>
		<span class="app-button-texts">CONFIRM</span>
	</button>

	@if (showSuccess) {
		<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
			<p>{{ successMessage }}</p>
			<button
				class="mt-2 cursor-pointer bg-green-500 text-white px-4 py-1 rounded hover:bg-green-600 transition"
				[routerLink]="'/auth'" [queryParams]="{ form: 'login '}">
				Confirm
			</button>
		</div>
	}

	@if (errorMessage) {
		<p class="text-red-600 text-sm mt-2">{{ errorMessage }}</p>
	}
</form>
